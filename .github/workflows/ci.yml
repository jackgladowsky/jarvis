name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Node ${{ matrix.node }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Set up test config
        # Tests transitively import `config.ts` and `agent/system-prompt.ts`,
        # both of which read files from $JARVIS_DATA_DIR at module-load time.
        # Provide a temp data dir seeded with the example config + prompt, and
        # stub the required env vars so the env schema validates at module load.
        # Tests don't exercise the secrets themselves — only config.ts needs
        # them to exist.
        run: |
          TEST_DATA_DIR="$(mktemp -d)"
          mkdir -p "$TEST_DATA_DIR/prompts"
          cp config.yaml.example "$TEST_DATA_DIR/config.yaml"
          cp prompts/system.md.example "$TEST_DATA_DIR/prompts/system.md"
          {
            echo "JARVIS_DATA_DIR=$TEST_DATA_DIR"
            echo "TELEGRAM_BOT_TOKEN=test-token"
            echo "TELEGRAM_ALLOWED_USER_IDS=0"
            echo "EXA_API_KEY=test-key"
          } >> "$GITHUB_ENV"

      - name: Coverage
        run: pnpm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov-node-${{ matrix.node }}
          path: coverage/lcov.info
          if-no-files-found: error
