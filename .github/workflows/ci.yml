name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  version-gate:
    name: Version gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      # pull_request normally checks out a synthetic merge commit. Fetch the
      # base commit explicitly through full history and compare against its
      # package.json rather than inferring it from HEAD's parents.
      - name: Checkout pull request
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check version is greater than base main
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-pr-version.mjs

  check:
    name: Node ${{ matrix.node }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shell scripts
        run: shellcheck scripts/*.sh

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Coverage
        # The test runner provisions and removes its own host-local config,
        # prompt, and placeholder credentials.
        run: pnpm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov-node-${{ matrix.node }}
          path: coverage/lcov.info
          if-no-files-found: error
